version: 1

script:
  - rm -rf AppDir
  - mkdir -p AppDir/usr/src
  - cp quicksnip.py AppDir/usr/src/
  - mkdir -p AppDir/usr/share/icons/hicolor/256x256/apps
  - cp icon.png AppDir/usr/share/icons/hicolor/256x256/apps/quicksnip.png

AppDir:
  path: ./AppDir

  app_info:
    id: com.github.yonie.quicksnip
    name: QuickSnip
    icon: quicksnip
    version: !ENV ${APP_VERSION}
    exec: usr/bin/python3
    exec_args: $APPDIR/usr/src/quicksnip.py $@

  apt:
    arch: amd64
    allow_unauthenticated: true
    sources:
      - sourceline: deb [trusted=yes] http://archive.ubuntu.com/ubuntu jammy main universe
      - sourceline: deb [trusted=yes] http://archive.ubuntu.com/ubuntu jammy-updates main universe
      - sourceline: deb [trusted=yes] http://security.ubuntu.com/ubuntu jammy-security main universe
    include:
      - python3
      - python3-gi
      - python3-gi-cairo
      - python3-cairo
      - gir1.2-gtk-3.0
      - gir1.2-gdkpixbuf-2.0
      - gir1.2-pango-1.0
      - libgtk-3-0
      - libglib2.0-0
      - libpcre3
      - libffi8
      - librsvg2-common
      - adwaita-icon-theme

  files:
    exclude:
      - usr/share/man
      - usr/share/doc/*/README.*
      - usr/share/doc/*/changelog.*
      - usr/share/doc/*/NEWS.*
      - usr/share/locale

  runtime:
    env:
      APPDIR_LIBRARY_PATH: '$APPDIR/usr/lib/x86_64-linux-gnu:$APPDIR/usr/lib/x86_64-linux-gnu/gtk-3.0'
      GI_TYPELIB_PATH: '$APPDIR/usr/lib/x86_64-linux-gnu/girepository-1.0'
      PYTHONPATH: '$APPDIR/usr/lib/python3/dist-packages:$APPDIR/usr/lib/python3.10'
      GTK_PATH: '$APPDIR/usr/lib/x86_64-linux-gnu/gtk-3.0'
      GDK_PIXBUF_MODULE_FILE: '$APPDIR/usr/lib/x86_64-linux-gnu/gdk-pixbuf-2.0/2.10.0/loaders.cache'
      XDG_DATA_DIRS: '$APPDIR/usr/share:$XDG_DATA_DIRS'

AppImage:
  arch: x86_64
  update-information: 'gh-releases-zsync|yonie|quicksnip|latest|*x86_64.AppImage.zsync'
