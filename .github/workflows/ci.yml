name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libgirepository1.0-dev \
            python3-gi gir1.2-gtk-3.0 python3-cairo
          pip install ruff PyGObject PyCairo
      - name: Ruff check
        run: ruff check quicksnip.py
      - name: Ruff format check
        run: ruff format --check quicksnip.py

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libgirepository1.0-dev \
            python3-gi gir1.2-gtk-3.0 python3-cairo
          pip install PyGObject PyCairo pytest
      - name: Run tests
        env:
          GDK_BACKEND: broadway
        run: python -m pytest tests/ -v